_version = 1

error.not-found = "arquivo não encontrado: %{path}"
error.permission-denied = "permissão negada: %{path}"
error.disk-full = "sem espaço disponível no dispositivo"
error.workspace-jail = "caminho escapa do limite do workspace: %{path}"
error.symlink-blocked = "alvo do symlink fora do workspace: %{path}"
error.state-drift = "checksum incompatível: esperado %{expected}, encontrado %{actual}"
error.immutable = "arquivo imutável: %{path}"
error.cross-device = "não é possível renomear entre sistemas de arquivos: %{path}"
error.fifo-detected = "named pipe não pode ser escrito atomicamente: %{path}"
error.device-file = "dispositivo de bloco ou caractere não pode ser escrito: %{path}"
error.invalid-input = "entrada inválida: %{reason}"
error.lock-timeout = "timeout de lock em %{path} após %{timeout_ms}ms"
