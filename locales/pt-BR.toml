suggestion.not-found = "verifique se o caminho do arquivo existe e está escrito corretamente"
suggestion.permission-denied = "verifique as permissões do arquivo ou execute com privilégios apropriados"
suggestion.disk-full = "libere espaço em disco e repita a operação"
suggestion.quota-exceeded = "verifique a cota de disco e libere espaço"
suggestion.cross-device = "garanta que origem e destino estejam no mesmo sistema de arquivos"
suggestion.io = "inspecione o erro de E/S subjacente: %{source}"
suggestion.config-invalid = "corrija a configuração: %{reason}"
suggestion.workspace-jail = "use --workspace para definir a raiz correta do projeto"
suggestion.workspace-jail-inside = "use um caminho dentro do workspace (%{workspace})"
suggestion.workspace-jail-set = "defina --workspace <raiz> (apenas XDG/config; sem variáveis de ambiente)"
suggestion.symlink-blocked = "use --follow-symlinks ou resolva o symlink manualmente"
suggestion.state-drift = "releia o arquivo para obter o checksum atual e repita"
suggestion.checksum-verify = "releia o arquivo para obter o checksum atual"
suggestion.file-too-large = "use --max-filesize para aumentar o limite ou processe arquivos menores"
suggestion.immutable = "remova a flag de imutabilidade com chattr -i"
suggestion.immutable-path = "remova o atributo imutável (chattr -i no Unix, fsutil no Windows) de %{path}"
suggestion.binary-file = "conteúdo binário detectado; use read --stat só para metadados ou read --format raw para emitir bytes brutos sem envelope JSON"
suggestion.fifo-detected = "use um arquivo regular em vez de um named pipe"
suggestion.device-file = "use um arquivo regular em vez de um nó de dispositivo"
suggestion.skip-special = "ignore este arquivo ou use redirecionamento de stdin"
suggestion.no-matches = "amplie o padrão de busca; verifique filtros --include / --exclude; confira o conteúdo do arquivo"
suggestion.match-ambiguous = "estreite --old com mais contexto ao redor ou passe --replace-all"
suggestion.match-failed = "inspecione best_candidate no NDJSON de erro e ajuste --old, ou reduza --fuzzy-threshold"
suggestion.cancelled = "operação cancelada por sinal; tente novamente após inspecionar journal/limpeza de temp"
suggestion.internal-error = "isto é um bug; reporte com o contexto %{reason}"
suggestion.edit-pair-failed = "o par %{index} não correspondeu; corrija o par, tente com --fuzzy aggressive, ou passe --partial para aplicar os pares válidos e reportar o restante"
suggestion.invalid-input = "revise %{reason}; confira argumentos e conteúdo de entrada quanto a erros de sintaxe"
suggestion.lock-timeout = "outro processo está editando %{path}; aguarde, encerre o processo bloqueante ou aumente --lock-timeout acima de %{timeout_ms} ms"
suggestion.syntax-error = "verificação de sintaxe pós-escrita encontrou %{count} erro(s) de sintaxe em %{path}; inspecione o conteúdo (ou desabilite com --syntax-check=false) e tente novamente"
suggestion.exdev-fallback-disabled = "rename entre filesystems falhou para %{path} e --strict-atomic foi definido; remova --strict-atomic para habilitar copy-fallback, ou mova origem/destino para o mesmo filesystem"
suggestion.copy-back-blake3-failed = "verificação BLAKE3 após escrita in-place falhou para %{path}; o arquivo no disco pode estar parcialmente escrito. Inspecione manualmente antes de tentar novamente."
suggestion.orphan-journal = "uma execução anterior do atomwrite travou e deixou o journal %{journal} (%{reason}). Inspecione o arquivo alvo e o journal manualmente, depois apague %{journal} quando o arquivo estiver no estado esperado"

warn.hardlink-detected = "alvo tem %{nlink} hard links: backup usa cópia para evitar corrupção de inode compartilhado"
warn.skipping-non-file = "ignorando caminho que não é arquivo: %{path}"
warn.backup-cleanup = "falha ao remover backup antigo: %{path}"
warn.write-risk = "risco de escrita: %{level} (%{delta_pct}% de delta, %{original} -> %{new_bytes} bytes)"
