name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2025-vs2026 is the successor to windows-latest before the
        # June 15 2026 GitHub-hosted runner migration. Pinning explicitly silences
        # the "windows-latest requests are being redirected" NOTICE and prevents
        # unexpected runner changes from breaking the build.
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Doc check
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

  msrv:
    name: MSRV 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - run: cargo check --all-features

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  size-gate:
    name: Slim binary size <= 15 MiB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build slim (core only)
        run: cargo build --release --no-default-features --features core
      - name: Assert slim size
        run: |
          SIZE=$(stat -c%s target/release/atomwrite)
          echo "slim_bytes=$SIZE"
          test "$SIZE" -le 15728640
      - name: Report full size (informational)
        run: |
          cargo build --release
          stat -c%s target/release/atomwrite || true

  core-test:
    name: Core-only test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Clippy core
        run: cargo clippy --no-default-features --features core -- -D warnings
      - name: Test core
        run: cargo test --no-default-features --features core

  schema-diff:
    name: Schema regen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Regen schemas
        run: bash scripts/regen-schemas.sh
      - name: Diff
        run: git diff --exit-code docs/schemas || (echo schemas drifted; commit regen output && exit 1)

